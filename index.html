<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>ISAO | 沉浸式 AR 名片體驗</title>

  <!-- 8th Wall 核心庫與 A-Frame 框架 -->
  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  
  <!-- 替換為您的 8th Wall API Key -->
  <script async src="//apps.8thwall.com/xrweb?key=YOUR_8THWALL_API_KEY"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    #overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
      color: white;
      text-align: center;
    }
    .hidden { display: none !important; }
    button {
      padding: 15px 40px;
      font-size: 20px;
      font-weight: bold;
      background: #007AFF;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,122,255,0.4);
      transition: transform 0.2s;
    }
    button:active { transform: scale(0.95); }
    h1 { margin-bottom: 10px; letter-spacing: 2px; }
    p { opacity: 0.8; margin-bottom: 30px; }
  </style>
</head>
<body>

  <!-- 入口遮罩層：確保 iOS 音訊/影片權限 -->
  <div id="overlay">
    <h1>ISAO AR</h1>
    <p>準備好體驗未來的名片了嗎？</p>
    <button id="startBtn">啟動 AR 掃描</button>
  </div>

  <a-scene
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true; shadowMapEnabled: true; antialias: true"
    xrweb="disableWorldTracking: false"> 

    <a-assets>
      <!-- 影片資源 -->
      <video id="videoAsset" 
             src="https://pub-ac80c6d0a305452bbe0bdfcec65b6a2c.r2.dev/NEWS.mp4" 
             loop="true" 
             crossorigin="anonymous" 
             playsinline></video>
      
      <!-- UI 圖示資源 -->
      <img id="iconPhone" src="https://cdn.pixabay.com/photo/2016/01/10/22/20/phone-1132641_1280.png">
      <img id="iconWeb" src="https://cdn.pixabay.com/photo/2016/06/13/17/30/mail-1454731_1280.png">
    </a-assets>

    <a-camera position="0 1.5 0" raycaster="objects: .cantap"></a-camera>

    <!-- 環境光影 -->
    <a-light type="directional" intensity="1.2" position="1 2 1"></a-light>
    <a-light type="ambient" intensity="0.6"></a-light>

    <!-- ───────────────────────────────────────────────────────── -->
    <!-- 正面偵測 (isaofront): AR 名片互動內容 -->
    <!-- ───────────────────────────────────────────────────────── -->
    <xrextras-named-image-target name="isaofront">
      <!-- 容器：當掃描到正面時顯示 -->
      <a-entity id="frontInterface">
        
        <!-- 沉浸式浮空按鈕 1: 撥打電話 (左側) -->
        <a-entity class="cantap"
          geometry="primitive: cylinder; radius: 0.12; height: 0.04"
          material="color: #ffffff; emissive: #ffffff; emissiveIntensity: 0.2"
          position="-0.35 0.2 0.15" 
          rotation="90 0 0"
          animation="property: position; dir: alternate; dur: 1500; loop: true; to: -0.35 0.25 0.2"
          onclick="window.location.href='tel:0912345678'">
          <!-- 按鈕上的 Icon -->
          <a-image src="#iconPhone" scale="0.15 0.15 0.15" position="0 0.025 0" rotation="-90 0 0"></a-image>
        </a-entity>

        <!-- 沉浸式浮空按鈕 2: 前往網站 (右側) -->
        <a-entity class="cantap"
          geometry="primitive: cylinder; radius: 0.12; height: 0.04"
          material="color: #ffffff; emissive: #ffffff; emissiveIntensity: 0.2"
          position="0.35 0.2 0.15"
          rotation="90 0 0"
          animation="property: position; dir: alternate; dur: 1800; loop: true; to: 0.35 0.25 0.2"
          onclick="window.open('https://www.isao.com.tw')">
          <a-image src="#iconWeb" scale="0.15 0.15 0.15" position="0 0.025 0" rotation="-90 0 0"></a-image>
        </a-entity>

        <!-- 浮空個人資訊文字 -->
        <a-text 
          value="MingHsun Li" 
          align="center" 
          position="0 0.6 0.2" 
          color="#FFFFFF" 
          width="4"
          font="https://cdn.aframe.io/fonts/Aileron-Semibold.fnt"></a-text>
        
        <a-text 
          value="Creative Director" 
          align="center" 
          position="0 0.45 0.18" 
          color="#007AFF" 
          width="2.5"></a-text>

      </a-entity>
    </xrextras-named-image-target>

    <!-- ───────────────────────────────────────────────────────── -->
    <!-- 背面偵測 (isaoback): 影片播放內容 -->
    <!-- ───────────────────────────────────────────────────────── -->
    <xrextras-named-image-target name="isaoback">
      <a-entity id="videoContent">
        <!-- 影片面板：稍微浮起 0.05 避免與實體名片閃爍(Z-fighting) -->
        <a-video id="arVideoPlayer" 
                 src="#videoAsset" 
                 width="1.6" 
                 height="0.9" 
                 position="0 0 0.05" 
                 rotation="0 0 0"></a-video>
        
        <!-- 背景裝飾邊框 -->
        <a-plane width="1.7" height="1.0" position="0 0 0.01" material="color: #000; opacity: 0.8"></a-plane>
      </a-entity>
    </xrextras-named-image-target>

  </a-scene>

  <script>
    const startBtn = document.getElementById('startBtn');
    const overlay = document.getElementById('overlay');
    const video = document.getElementById('videoAsset');
    
    // 獲取場景中的目標元素
    const frontTarget = document.querySelector('[name="isaofront"]');
    const backTarget = document.querySelector('[name="isaoback"]');

    // 啟動按鈕點擊事件
    startBtn.addEventListener('click', () => {
      overlay.classList.add('hidden');
      
      // 激活影片（iOS 靜音預播放策略）
      video.play().then(() => {
        video.pause();
        video.currentTime = 0;
      }).catch(e => console.log("Video init failed:", e));
    });

    // 背面影片控制邏輯
    backTarget.addEventListener('xrimagefound', () => {
      console.log('✅ 掃描到背面 (isaoback)，開始播放影片');
      video.play();
    });

    backTarget.addEventListener('xrimagelost', () => {
      console.log('❌ 失去背面追蹤，暫停影片');
      video.pause();
    });

    // 正面追蹤日誌
    frontTarget.addEventListener('xrimagefound', () => {
      console.log('✅ 掃描到正面 (isaofront)，顯示互動名片');
    });

  </script>
</body>
</html>
