  <script>
  // ═══ DEBUG ════════════════════════════════════════════
  const D = {
    el: null,
    init() {
      this.el = document.getElementById('dbg');
      document.getElementById('bdbg').addEventListener('click', () => this.el.classList.toggle('show'));
      window.addEventListener('error', e => this.log(e.message + ' L' + e.lineno, 'err'));
    },
    log(m, t='inf') {
      if (!this.el) return;
      const d = document.createElement('div');
      d.className = t;
      d.textContent = new Date().toLocaleTimeString('zh-TW') + ' ' + m;
      this.el.appendChild(d);
      this.el.scrollTop = this.el.scrollHeight;
    }
  };
  D.init();

  // ═══ UI HELPERS ═══════════════════════════════════════
  let _stT, _toastT;
  function showSt(msg, dur=2800) {
    const e = document.getElementById('status');
    e.textContent = msg; e.classList.add('show');
    clearTimeout(_stT); _stT = setTimeout(() => e.classList.remove('show'), dur);
  }
  function showToast(msg) {
    const e = document.getElementById('toast');
    e.textContent = msg; e.classList.add('show');
    clearTimeout(_toastT); _toastT = setTimeout(() => e.classList.remove('show'), 1400);
  }
  function doFlash() {
    const f = document.getElementById('flash');
    f.classList.add('on'); setTimeout(() => f.classList.remove('on'), 800);
  }

  // ═══ PREFLIGHT ════════════════════════════════════════
  async function preflight() {
    for (const [u,l] of [
      ['./external/xr/xr.js',         'xr.js'],
      ['./external/xr/xr-slam.js',    'xr-slam.js ← 相機核心'],
      [AR_CONFIG.cardTargetJson,       'isaofront.json'],
      [AR_CONFIG.videoTargetJson,      'isaoback.json'],
    ]) {
      try {
        const r = await fetch(u, {method:'HEAD'});
        D.log((r.ok?'✅':'❌')+' '+l+(r.ok?'':' HTTP'+r.status), r.ok?'ok':'err');
      } catch { D.log('❌ '+l, 'err'); }
    }
  }

  // ═══════════════════════════════════════════════════════
  // ★★★  3D CARD CONTENT SYSTEM  ★★★
  //
  // 所有聯絡資訊、按鈕、社群圖示均以 Three.js CanvasTexture /
  // TextureLoader 建立，附加在 cardGroup，真正浮現在 AR 空間中。
  // 點擊透過 Raycaster 偵測，完全不依賴 DOM overlay。
  // ═══════════════════════════════════════════════════════

  // ── Canvas helper: 圓角矩形路徑 ───────────────────────
  function rrect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);   ctx.arcTo(x+w, y,   x+w, y+r,   r);
    ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
    ctx.lineTo(x+r, y+h);   ctx.arcTo(x, y+h,   x, y+h-r,   r);
    ctx.lineTo(x, y+r);     ctx.arcTo(x, y,     x+r, y,      r);
    ctx.closePath();
  }

  // ── Canvas mesh factory ────────────────────────────────
  // drawFn(ctx, W, H) → void
  // Returns THREE.Mesh with CanvasTexture
  function mkCanvas(planeW, planeH, texW, texH, drawFn) {
    const cv = document.createElement('canvas');
    cv.width = texW; cv.height = texH;
    const ctx = cv.getContext('2d');
    drawFn(ctx, texW, texH);
    const tex = new THREE.CanvasTexture(cv);
    tex.minFilter = tex.magFilter = THREE.LinearFilter;
    const mesh = new THREE.Mesh(
      new THREE.PlaneGeometry(planeW, planeH),
      new THREE.MeshBasicMaterial({map:tex, transparent:true, side:THREE.DoubleSide, toneMapped:false, depthWrite:false})
    );
    return mesh;
  }

  // ── Image-texture mesh (for social icons & profile photo) ─
  function mkImgMesh(planeW, planeH, url, onLoad, onErr) {
    const loader = new THREE.TextureLoader();
    loader.crossOrigin = 'anonymous';
    const mesh = new THREE.Mesh(
      new THREE.PlaneGeometry(planeW, planeH),
      new THREE.MeshBasicMaterial({color:0x001830, transparent:true, side:THREE.DoubleSide, toneMapped:false, depthWrite:false})
    );
    loader.load(url,
      tex => {
        tex.minFilter = tex.magFilter = THREE.LinearFilter;
        mesh.material.map   = tex;
        mesh.material.color.set(0xffffff);
        mesh.material.needsUpdate = true;
        if (onLoad) onLoad(mesh);
      },
      undefined,
      () => { if (onErr) onErr(mesh); }
    );
    return mesh;
  }

  // ── Circle-cropped profile photo ──────────────────────
  function mkCirclePhoto(planeSize, imgUrl, callback) {
    const SZ = 256;
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const cv = document.createElement('canvas');
      cv.width = cv.height = SZ;
      const ctx = cv.getContext('2d');
      // Glow ring
      ctx.shadowColor = 'rgba(0,200,255,0.5)';
      ctx.shadowBlur  = 14;
      ctx.beginPath(); ctx.arc(SZ/2, SZ/2, SZ/2-2, 0, Math.PI*2); ctx.clip();
      ctx.drawImage(img, 0, 0, SZ, SZ);
      ctx.resetTransform();
      // Border
      ctx.beginPath(); ctx.arc(SZ/2, SZ/2, SZ/2-2, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(0,190,255,0.75)'; ctx.lineWidth = 5; ctx.stroke();
      const tex = new THREE.CanvasTexture(cv);
      tex.minFilter = tex.magFilter = THREE.LinearFilter;
      const mesh = new THREE.Mesh(
        new THREE.PlaneGeometry(planeSize, planeSize),
        new THREE.MeshBasicMaterial({map:tex, transparent:true, side:THREE.DoubleSide, toneMapped:false, depthWrite:false})
      );
      callback(mesh);
    };
    img.onerror = () => D.log('❌ 個人照片載入失敗', 'err');
    img.src = imgUrl;
  }

  // ── Build the 3D floating card info layout ────────────
  // All positions are in cardGroup LOCAL space.
  // The card target normalizes to width=1.0 in local space.
  // Layout assumes a landscape card (88×54mm ≈ aspect 1.63).
  //   Card local extent: x[-0.5,+0.5], y[-0.306,+0.306]
  //   Content extends beyond card edges for visibility.
  //
  // Layout (approximate, all z=0.05~0.08 to float above card):
  //   LEFT : Raccoon (handled separately in loadRaccoon)
  //   RIGHT: Profile photo, Name, Title (top right)
  //   BOTTOM half (full width): Contact buttons × 3
  //   BELOW card: Social icons row × 4
  // ─────────────────────────────────────────────────────
  function buildCardContent(parentGroup, interactables) {
    const Z  = 0.06;  // z-offset: float this many "card widths" above surface
    const Zb = 0.04;  // background slightly deeper

    // ① Semi-transparent background panel behind all content
    const bgMesh = mkCanvas(0.92, 0.80, 512, 444, (ctx, W, H) => {
      ctx.clearRect(0, 0, W, H);
      rrect(ctx, 3, 3, W-6, H-6, 32);
      ctx.fillStyle = 'rgba(0,8,28,0.82)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,180,255,0.45)';
      ctx.lineWidth = 2.5;
      ctx.stroke();
      // Top accent line
      const g = ctx.createLinearGradient(0,0,W,0);
      g.addColorStop(0,'rgba(0,180,255,0)');
      g.addColorStop(0.35,'rgba(0,210,255,0.75)');
      g.addColorStop(0.65,'rgba(0,210,255,0.75)');
      g.addColorStop(1,'rgba(0,180,255,0)');
      ctx.fillStyle = g; ctx.fillRect(3, 3, W-6, 2.5);
    });
    bgMesh.position.set(0.05, -0.04, Zb);
    parentGroup.add(bgMesh);

    // ② Name text
    const nameMesh = mkCanvas(0.44, 0.082, 512, 96, (ctx, W, H) => {
      ctx.clearRect(0, 0, W, H);
      ctx.shadowColor = 'rgba(0,210,255,0.6)'; ctx.shadowBlur = 14;
      ctx.fillStyle   = 'rgba(230,248,255,1)';
      ctx.font        = `bold ${Math.round(H*0.62)}px sans-serif`;
      ctx.textAlign   = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(AR_CONFIG.profile.name, W/2, H/2);
    });
    nameMesh.position.set(0.28, 0.07, Z);
    parentGroup.add(nameMesh);

    // ③ Title text
    const titleMesh = mkCanvas(0.42, 0.055, 512, 64, (ctx, W, H) => {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = 'rgba(0,175,255,0.85)';
      ctx.font      = `${Math.round(H*0.55)}px monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(AR_CONFIG.profile.title.toUpperCase(), W/2, H/2);
    });
    titleMesh.position.set(0.28, -0.01, Z);
    parentGroup.add(titleMesh);

    // ④ Horizontal divider
    const divMesh = mkCanvas(0.82, 0.005, 512, 4, (ctx, W, H) => {
      const g = ctx.createLinearGradient(0,0,W,0);
      g.addColorStop(0,'rgba(0,190,255,0)');
      g.addColorStop(0.25,'rgba(0,190,255,0.4)');
      g.addColorStop(0.75,'rgba(0,190,255,0.4)');
      g.addColorStop(1,'rgba(0,190,255,0)');
      ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    });
    divMesh.position.set(0.04, -0.09, Z);
    parentGroup.add(divMesh);

    // ⑤ Contact buttons (clickable) — 3 rows
    // Draw a button with color accent, icon, label
    function drawBtn(ctx, W, H, c) {
      ctx.clearRect(0, 0, W, H);
      // Background
      rrect(ctx, 2, 2, W-4, H-4, H*0.28);
      ctx.fillStyle = 'rgba(0,22,58,0.75)'; ctx.fill();
      ctx.strokeStyle = 'rgba(0,150,255,0.2)'; ctx.lineWidth = 1.5; ctx.stroke();
      // Left accent bar
      rrect(ctx, 2, 2, 6, H-4, 3);
      ctx.fillStyle = c.color; ctx.fill();
      // Icon
      const ih = Math.round(H * 0.55);
      ctx.font = `${ih}px sans-serif`;
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(220,242,255,0.9)';
      ctx.fillText(c.icon, H*0.42, H*0.5);
      // Label
      const lh = Math.round(H * 0.4);
      ctx.font = `${lh}px sans-serif`;
      ctx.fillStyle = 'rgba(190,230,255,0.92)';
      ctx.fillText(c.label, H*1.2, H*0.5);
      // Arrow hint
      ctx.font = `${Math.round(H*0.32)}px monospace`;
      ctx.textAlign = 'right';
      ctx.fillStyle = 'rgba(0,160,255,0.4)';
      ctx.fillText('›', W-H*0.35, H*0.5);
    }

    AR_CONFIG.contacts.forEach((c, i) => {
      const m = mkCanvas(0.80, 0.10, 512, 64, (ctx, W, H) => drawBtn(ctx, W, H, c));
      m.position.set(0.04, -0.19 - i * 0.115, Z);
      parentGroup.add(m);
      interactables.push({ mesh:m, url:c.url, label:c.label });
    });

    // ⑥ "TAP BUTTONS TO CONTACT" hint text
    const hintMesh = mkCanvas(0.58, 0.034, 512, 28, (ctx, W, H) => {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = 'rgba(0,155,255,0.38)';
      ctx.font      = `${Math.round(H*0.65)}px monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('● TAP BUTTON TO CONTACT ●', W/2, H/2);
    });
    hintMesh.position.set(0.04, -0.53, Z);
    parentGroup.add(hintMesh);

    // ⑦ Social icon row (4 square icons, clickable)
    // Fallback: colored square with first letter
    function makeFallbackIcon(label) {
      return mkCanvas(0.13, 0.13, 128, 128, (ctx, W, H) => {
        rrect(ctx, 3, 3, W-6, H-6, 18);
        ctx.fillStyle = 'rgba(0,24,64,0.85)'; ctx.fill();
        ctx.strokeStyle = 'rgba(0,140,255,0.3)'; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = 'rgba(0,180,255,0.8)';
        ctx.font = `bold ${Math.round(W*0.45)}px sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(label[0], W/2, H/2);
      });
    }

    const socXs = [-0.275, -0.09, +0.09, +0.275];
    AR_CONFIG.socials.forEach((s, i) => {
      // Start with fallback, replace with image when loaded
      const fbMesh = makeFallbackIcon(s.label);
      fbMesh.position.set(socXs[i], -0.64, Z);
      parentGroup.add(fbMesh);
      interactables.push({ mesh:fbMesh, url:s.url, label:s.label });

      const loader = new THREE.TextureLoader();
      loader.crossOrigin = 'anonymous';
      loader.load(s.img, tex => {
        tex.minFilter = tex.magFilter = THREE.LinearFilter;
        fbMesh.material.map   = tex;
        fbMesh.material.color.set(0xffffff);
        fbMesh.material.needsUpdate = true;
      });
    });

    // ⑧ Profile photo (async load, circle-cropped)
    mkCirclePhoto(0.23, AR_CONFIG.profile.photo, mesh => {
      mesh.position.set(0.3, 0.24, Z + 0.005);
      parentGroup.add(mesh);
    });
  }

  // ── Raccoon GLTF loader ────────────────────────────────
  function loadRaccoon(parentGroup, onLoaded) {
    const loader = new THREE.GLTFLoader();
    loader.load(
      AR_CONFIG.raccoonSrc,
      gltf => {
        const model = gltf.scene;
        const mixer = new THREE.AnimationMixer(model);
        gltf.animations.forEach(clip => mixer.clipAction(clip).play());
        model.scale.setScalar(0.09);
        model.position.set(-0.3, -0.15, 0);
        parentGroup.add(model);
        D.log('✅ 浣熊載入完成，動畫×' + gltf.animations.length, 'ok');
        onLoaded({ model, mixer });
      },
      undefined,
      err => D.log('❌ GLTF: ' + (err.message || err), 'err')
    );
  }

  // ═══════════════════════════════════════════════════════
  //  AR MODULE
  // ═══════════════════════════════════════════════════════
  function mkARModule(allTargetData) {

    // ── ★ BUG FIX：用 .name 欄位直接比對，不靠 index ─────
    // 舊的 allTargetData[0] / [1] 做法：
    //   若 isaofront.json 載入失敗，filter(Boolean) 後 index 0 = isaoback
    //   → isaoback 被誤判為 card target → 正面永遠無法觸發
    // 新做法：
    //   AR_CONFIG.cardTargetName  = 'isaofront'  (config 直接指定)
    //   AR_CONFIG.videoTargetName = 'isaoback'
    //   onFound() 用 name === AR_CONFIG.cardTargetName 判斷
    // ─────────────────────────────────────────────────────
    const cardName  = AR_CONFIG.cardTargetName;
    const videoName = AR_CONFIG.videoTargetName;

    // 驗證兩個 target 都有成功載入
    const hasCard  = allTargetData.some(d => d.name === cardName);
    const hasVideo = allTargetData.some(d => d.name === videoName);
    D.log('card  "'+cardName+'": '  + (hasCard  ? '✅' : '❌ 未載入'), hasCard  ? 'ok' : 'err');
    D.log('video "'+videoName+'": ' + (hasVideo ? '✅' : '❌ 未載入'), hasVideo ? 'ok' : 'err');

    // 3D groups
    let cardGroup, raccoonData = null;
    let videoGroup, videoMesh, videoEl, videoTex;
    let videoPlaying = false, videoHasInteracted = false;

    // Raycaster interactables: [{mesh, url, label}]
    const interactables = [];
    const raycaster     = new THREE.Raycaster();
    let   sceneCamera   = null;  // stored in onStart

    const clock   = new THREE.Clock();
    const scanEl  = document.getElementById('scan-ov');
    const vpPanel = document.getElementById('video-panel');
    const vpIcon  = document.getElementById('vp-icon');
    const vpTxt   = document.getElementById('vp-txt');

    const S = { cardVis:false, videoVis:false };

    // ── Touch / click → raycast ────────────────────────
    function handleTap(clientX, clientY) {
      if (!S.cardVis || !sceneCamera || interactables.length === 0) return;

      const canvas = document.getElementById('renderCanvas');
      const rect   = canvas.getBoundingClientRect();
      const ndcX   = ((clientX - rect.left) / rect.width)  * 2 - 1;
      const ndcY   = -((clientY - rect.top)  / rect.height) * 2 + 1;

      raycaster.setFromCamera({ x: ndcX, y: ndcY }, sceneCamera);
      const meshes = interactables.map(i => i.mesh);
      const hits   = raycaster.intersectObjects(meshes, false);

      if (hits.length > 0) {
        const item = interactables.find(i => i.mesh === hits[0].object);
        if (!item) return;
        D.log('3D tap → ' + item.label + ' : ' + item.url, 'ok');
        // Visual feedback: briefly scale up
        item.mesh.scale.set(1.1, 1.1, 1.1);
        setTimeout(() => item.mesh.scale.set(1,1,1), 200);
        showToast('▶ ' + item.label);
        // Open URL
        if (item.url.startsWith('http')) {
          window.open(item.url, '_blank', 'noopener noreferrer');
        } else {
          window.location.href = item.url;
        }
      }
    }

    // ── Video panel button ─────────────────────────────
    document.getElementById('vp-play-btn').addEventListener('click', e => {
      e.stopPropagation();
      if (!videoEl) return;
      if (!videoHasInteracted) { videoEl.muted = false; videoHasInteracted = true; }
      if (videoPlaying) {
        videoEl.pause(); videoPlaying = false;
        vpIcon.textContent = '▶'; vpTxt.textContent = '點擊螢幕 播放影片';
      } else {
        videoEl.play().then(() => {
          videoPlaying = true;
          vpIcon.textContent = '⏸'; vpTxt.textContent = '點擊螢幕 暫停影片';
        }).catch(err => D.log('影片播放失敗: '+err.message, 'err'));
      }
    });

    function applyPose(group, detail) {
      const {position:p, rotation:r, scale:s} = detail;
      group.position.set(p.x, p.y, p.z);
      group.quaternion.set(r.x, r.y, r.z, r.w);
      group.scale.setScalar(s);
    }

    function onFound({ detail }) {
      const name = detail.name;
      D.log('✅ imagefound: "' + name + '"', 'ok');
      doFlash();

      if (name === cardName) {
        applyPose(cardGroup, detail);
        cardGroup.visible = true;
        S.cardVis = true;
        scanEl.classList.add('hidden');
        showSt('🦝 名片已鎖定！點擊 3D 按鈕聯絡', 4000);
      }

      if (name === videoName) {
        applyPose(videoGroup, detail);
        videoGroup.visible = true;
        S.videoVis = true;
        scanEl.classList.add('hidden');
        vpPanel.classList.add('show');
        if (!videoHasInteracted && videoEl) {
          videoEl.muted = true; videoEl.currentTime = 0;
          videoEl.play().then(() => {
            videoPlaying = true;
            vpIcon.textContent = '⏸'; vpTxt.textContent = '點擊螢幕 暫停影片';
          }).catch(()=>{});
        }
        showSt('🎬 影片目標鎖定');
      }
    }

    function onUpdated({ detail }) {
      const name = detail.name;
      if (name === cardName) {
        applyPose(cardGroup, detail);
        if (!S.cardVis) { cardGroup.visible = true; S.cardVis = true; }
      }
      if (name === videoName) {
        applyPose(videoGroup, detail);
        if (!S.videoVis) { videoGroup.visible = true; S.videoVis = true; }
      }
    }

    function onLost({ detail }) {
      const name = detail?.name || '';
      D.log('📍 imagelost: "' + name + '"', 'inf');
      if (name === cardName) {
        S.cardVis = false;
        cardGroup.visible = false;
        // 保持 3D content 的 interactables 可見狀態，
        // 讓使用者略微移開後仍可點擊（若希望消失則改 true→false）
      }
      if (name === videoName) {
        S.videoVis = false;
        videoGroup.visible = false;
        vpPanel.classList.remove('show');
        if (videoEl) { videoEl.pause(); videoPlaying = false; }
        vpIcon.textContent = '▶'; vpTxt.textContent = '點擊螢幕 播放影片';
      }
      if (!S.cardVis && !S.videoVis) {
        scanEl.classList.remove('hidden');
        showSt('🔍 請對準名片正面或背面');
      }
    }

    return {
      name: 'ar-card',

      onStart() {
        const { scene, renderer, camera } = XR8.Threejs.xrScene();
        sceneCamera = camera;

        // ★ 黑屏修復：Three.js 每幀不清畫布（否則蓋掉相機畫面）
        renderer.autoClear = false;
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight, false);
        renderer.domElement.style.cssText =
          'position:fixed!important;top:0!important;left:0!important;' +
          'width:100vw!important;height:100vh!important;z-index:0!important;';

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 1.1));
        const dir = new THREE.DirectionalLight(0xffffff, 0.7);
        dir.position.set(0.5, 1.5, 1); scene.add(dir);

        // ── Card group (名片正面 → raccoon + 3D info) ──
        cardGroup = new THREE.Group();
        cardGroup.visible = false;
        scene.add(cardGroup);

        loadRaccoon(cardGroup, data => { raccoonData = data; });
        buildCardContent(cardGroup, interactables);

        // ── Video group (名片背面 → 影片平面) ──────────
        videoGroup = new THREE.Group();
        videoGroup.visible = false;
        scene.add(videoGroup);

        videoEl = document.createElement('video');
        videoEl.src = AR_CONFIG.videoSrc;
        videoEl.loop = true; videoEl.muted = true;
        videoEl.playsInline = true; videoEl.crossOrigin = 'anonymous';
        videoEl.setAttribute('webkit-playsinline', 'true');

        videoTex = new THREE.VideoTexture(videoEl);
        videoTex.minFilter = videoTex.magFilter = THREE.LinearFilter;
        videoTex.format = THREE.RGBAFormat;

        videoMesh = new THREE.Mesh(
          new THREE.PlaneGeometry(1.5, 1.5*(9/16)),
          new THREE.MeshBasicMaterial({map:videoTex, side:THREE.DoubleSide, toneMapped:false})
        );
        videoGroup.add(videoMesh);

        // ── Touch / click 事件（3D button raycasting）──
        const cvs = renderer.domElement;
        cvs.addEventListener('touchend', e => {
          e.preventDefault();
          if (e.changedTouches.length > 0) {
            const t = e.changedTouches[0];
            handleTap(t.clientX, t.clientY);
          }
        }, { passive: false });
        cvs.addEventListener('click', e => handleTap(e.clientX, e.clientY));

        D.log('✅ Scene 準備完成（3D card content + raycaster）', 'ok');
        clock.start();
        setTimeout(() => showSt('請對準名片正面（小浣熊）或背面（影片）', 4000), 800);
      },

      onUpdate() {
        const delta = clock.getDelta();
        if (raccoonData?.mixer) raccoonData.mixer.update(delta);
        // Raccoon floating sine wave
        if (raccoonData?.model && cardGroup.visible) {
          raccoonData.model.position.y = -0.15 + Math.sin(clock.elapsedTime * 1.2) * 0.022;
        }
      },

      listeners: [
        { event:'reality.imagefound',   process:onFound   },
        { event:'reality.imageupdated', process:onUpdated },
        { event:'reality.imagelost',    process:onLost    },
      ],

      onAttach() {
        window.addEventListener('resize', () => {
          const { renderer } = XR8.Threejs.xrScene();
          renderer.setSize(window.innerWidth, window.innerHeight, false);
        });
        document.addEventListener('visibilitychange', () => {
          if (document.hidden && videoEl) { videoEl.pause(); videoPlaying = false; }
          else if (S.videoVis && videoPlaying && videoEl) videoEl.play().catch(()=>{});
        });
      }
    };
  }

  // ═══ MAIN — Permission Gate ═══════════════════════════
  let _xrReady = false, _allTargetData = null;

  window.addEventListener('xrloaded', () => {
    _xrReady = true;
    D.log('✅ xrloaded', 'ok');
  });

  async function preloadTargets() {
    const cfgs = [
      { path:AR_CONFIG.cardTargetJson,  label:'isaofront' },
      { path:AR_CONFIG.videoTargetJson, label:'isaoback'  },
    ];
    const results = [];
    for (const {path, label} of cfgs) {
      try {
        const r = await fetch(path);
        if (!r.ok) throw new Error('HTTP'+r.status);
        const d = await r.json();
        results.push(d);
        D.log('✅ "'+d.name+'" 預載完成 ('+label+')', 'ok');
      } catch(e) {
        D.log('❌ '+label+' 失敗: '+e.message, 'err');
        // ★ push null 保持 index，但 mkARModule 已改為 name 比對，不影響路由
        results.push(null);
      }
    }
    const valid = results.filter(Boolean);
    if (valid.length === 0) {
      document.getElementById('dbg').classList.add('show');
      showSt('❌ 目標 JSON 均載入失敗', 8000);
    }
    _allTargetData = valid;
  }

  async function requestMotionPermissions() {
    for (const E of [DeviceMotionEvent, DeviceOrientationEvent]) {
      if (typeof E !== 'undefined' && typeof E.requestPermission === 'function') {
        try { await E.requestPermission(); } catch {}
      }
    }
  }

  async function startXR8() {
    showSt('AR 初始化中…', 4000);
    if (!_allTargetData) {
      let w=0;
      while (!_allTargetData && w<10000) { await new Promise(r=>setTimeout(r,200)); w+=200; }
    }
    if (!_allTargetData?.length) { showSt('❌ 目標資料未就緒', 8000); return; }
    let w=0;
    while (!_xrReady && w<12000) { await new Promise(r=>setTimeout(r,200)); w+=200; }
    if (!_xrReady) { showSt('❌ AR 引擎未就緒', 8000); return; }

    XR8.XrController.configure({ disableWorldTracking:true, imageTargetData:_allTargetData });
    D.log('XrController: targets='+_allTargetData.length, 'ok');

    XR8.addCameraPipelineModules([
      XR8.GlTextureRenderer.pipelineModule(),
      XR8.Threejs.pipelineModule(),
      XR8.XrController.pipelineModule(),
      mkARModule(_allTargetData),
    ]);
    XR8.run({ canvas:document.getElementById('renderCanvas') });
    D.log('✅ XR8.run()', 'ok');
  }

  document.getElementById('btn-start').addEventListener('click', async function() {
    this.disabled = true; this.textContent = '授權中…';
    await requestMotionPermissions();
    document.getElementById('perm-gate').classList.add('fade');
    setTimeout(() => { document.getElementById('perm-gate').style.display='none'; }, 700);
    await startXR8();
  });

  window.addEventListener('xrerror', e => {
    D.log('❌ xrerror: '+JSON.stringify(e.detail), 'err');
    document.getElementById('dbg').classList.add('show');
    showSt('❌ AR 引擎錯誤', 10000);
  });

  window.addEventListener('load', () => { preflight(); preloadTargets(); });
  </script>
</body>
</html>
