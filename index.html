<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>AR 名片 · MingHsun Li</title>

  <script>
  const AR_CONFIG = {
    targetJsonPaths: ['./image-targets/isaofront.json', './image-targets/isaoback.json'],
    videoSrc: 'https://pub-ac80c6d0a305452bbe0bdfcec65b6a2c.r2.dev/NEWS.mp4',
    raccoonSrc: 'https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/band-example/raccoon/scene.gltf',
    profile: {
      photo: 'https://raw.githubusercontent.com/isaoinvest/name-card/main/Big%20Head%20Shot.png',
      name: 'MingHsun Li',
      title: 'Red Panda Keeper'
    },
    contacts: [
      { label:'Website', icon:'🌐', accent:'#00aaff', url:'https://isaoinvest.com' },
      { label:'Email',   icon:'✉',  accent:'#00cc88', url:'mailto:isaoinvest@gmail.com' },
      { label:'Phone',   icon:'☎',  accent:'#ff8800', url:'tel:+886920820259' },
    ],
    socials: [
      { label:'LINE',      img:'https://raw.githubusercontent.com/isaoinvest/name-card/main/Line-1.png', url:'https://line.me/R/ti/p/@722fdkca' },
      { label:'YouTube',   img:'https://raw.githubusercontent.com/isaoinvest/name-card/main/Youtube-1.png', url:'https://www.youtube.com/channel/UC7hJoQaFXoqB-tW4zACOtvQ' },
      { label:'Instagram', img:'https://raw.githubusercontent.com/isaoinvest/name-card/main/Instagram-1.png', url:'https://www.instagram.com/isaoinvest' },
      { label:'Facebook',  img:'https://raw.githubusercontent.com/isaoinvest/name-card/main/Facebook-1.png', url:'https://www.facebook.com/profile.php?id=61552552833098' },
    ]
  };
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="./external/xr/xr.js" data-preload-chunks="slam"></script>

  <style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none}
  #renderCanvas{position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;z-index:0}
  [class*="xr8"],[id*="xr8"],[class*="poweredby"],[id*="powered"]{visibility:hidden!important;pointer-events:none!important}
  
  #scan-ov{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;pointer-events:none;opacity:1;transition:opacity .6s}
  #scan-ov.hidden{opacity:0}
  .sbox{width:218px;height:218px;position:relative;border:1.5px solid rgba(0,210,255,.35);border-radius:12px}
  .sline{position:absolute;height:2px;width:100%;top:0;background:linear-gradient(90deg,transparent,#00eeff 30%,#00eeff 70%,transparent);animation:scan 2s ease-in-out infinite}
  .corn{position:absolute;width:20px;height:20px;border-color:rgba(0,238,255,.9);border-style:solid;border-width:0}
  #scan-label{font-family:monospace;font-size:11px;letter-spacing:2px;color:rgba(0,210,255,.7);text-align:center}

  #status{position:fixed;top:14px;left:50%;transform:translateX(-50%);padding:7px 18px;background:rgba(0,6,22,.9);border:1px solid rgba(0,175,255,.4);border-radius:20px;backdrop-filter:blur(10px);font-family:monospace;font-size:11px;color:rgba(0,205,255,.95);z-index:100;opacity:0;transition:opacity .3s}
  #status.show{opacity:1}

  #flash{position:fixed;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:none;opacity:0;transition:opacity .6s;background:radial-gradient(circle,rgba(0,210,255,.15),transparent 68%)}
  #flash.on{opacity:1}

  #toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:9px 22px;background:rgba(0,30,90,.94);border:1px solid rgba(0,200,255,.5);border-radius:28px;font-family:monospace;font-size:12px;color:rgba(0,220,255,.95);z-index:200;opacity:0;transition:opacity .18s;pointer-events:none}
  #toast.show{opacity:1}

  #video-panel{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);z-index:60;opacity:0;transition:all .4s;pointer-events:none}
  #video-panel.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  .vp-pill{display:flex;align-items:center;gap:10px;padding:11px 22px;background:rgba(0,6,22,.92);border:1px solid rgba(0,175,255,.35);border-radius:50px;backdrop-filter:blur(14px);font-family:monospace;font-size:11px;color:rgba(0,200,255,.88);cursor:pointer}
  
  .btn-bar{position:fixed;bottom:0;left:0;right:0;height:64px;z-index:600;display:flex;align-items:center;justify-content:center;gap:12px;background:rgba(0,4,14,.96);border-top:1px solid rgba(0,150,255,.18)}
  .bb{height:40px;padding:0 18px;background:rgba(0,20,60,.8);border:1px solid rgba(0,150,255,.35);border-radius:20px;font-family:monospace;font-size:11px;color:rgba(0,200,255,.9);cursor:pointer;display:flex;align-items:center;gap:6px}
  .bb:active{background:rgba(0,80,200,.5)}

  /* 掃描框角落 */
  .c-tl{top:0;left:0;border-top-width:2.5px;border-left-width:2.5px;border-top-left-radius:6px}
  .c-tr{top:0;right:0;border-top-width:2.5px;border-right-width:2.5px;border-top-right-radius:6px}
  .c-bl{bottom:0;left:0;border-bottom-width:2.5px;border-left-width:2.5px;border-bottom-left-radius:6px}
  .c-br{bottom:0;right:0;border-bottom-width:2.5px;border-right-width:2.5px;border-bottom-right-radius:6px}

  @keyframes scan {
    0%  { top:0;   opacity:1 }
    50% { top:calc(100% - 2px); opacity:.7 }
    100%{ top:0;   opacity:1 }
  }
  @keyframes pulse {
    0%,100%{ transform:scale(1);   opacity:1   }
    50%    { transform:scale(1.15);opacity:.75 }
  }
  </style>
</head>
<body>

  <canvas id="renderCanvas"></canvas>
  <div id="flash"></div>
  <div id="toast"></div>

  <div id="scan-ov">
    <div class="sbox">
      <div class="sline"></div>
      <div class="corn c-tl"></div><div class="corn c-tr"></div>
      <div class="corn c-bl"></div><div class="corn c-br"></div>
    </div>
    <div id="scan-label">AR READY<br>請對準名片正面或背面</div>
  </div>

  <div id="status"></div>

  <div id="video-panel">
    <div class="vp-pill" id="vp-play-btn">
      <span id="vp-icon">▶</span>
      <span id="vp-txt">點擊 播放影片</span>
    </div>
  </div>

  <div class="btn-bar">
    <button class="bb" id="bb-play">▶ 播放</button>
    <button class="bb" id="bb-mute">🔇 靜音</button>
    <button class="bb" id="bb-holo">🔷 全息</button>
  </div>

  <script>
  // ==================== UI Helpers ====================
  let _stT, _toastT;
  function showSt(msg, dur=3000) {
    const e = document.getElementById('status');
    e.textContent = msg; e.classList.add('show');
    clearTimeout(_stT); _stT = setTimeout(() => e.classList.remove('show'), dur);
  }
  function showToast(msg) {
    const e = document.getElementById('toast');
    e.textContent = msg; e.classList.add('show');
    clearTimeout(_toastT); _toastT = setTimeout(() => e.classList.remove('show'), 1800);
  }
  function doFlash() {
    const f = document.getElementById('flash');
    f.classList.add('on'); setTimeout(() => f.classList.remove('on'), 700);
  }

  // ==================== Canvas 工具函式 ====================
  function createTextCanvas(text, fontSize, canvasW, canvasH, color='#ffffff') {
    const canvas = document.createElement('canvas');
    canvas.width  = canvasW;
    canvas.height = canvasH;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvasW, canvasH);
    ctx.fillStyle   = color;
    ctx.font        = `bold ${fontSize}px 'Helvetica Neue',Arial,sans-serif`;
    ctx.textAlign   = 'center';
    ctx.textBaseline= 'middle';
    // 發光
    ctx.shadowColor = color === '#ffffff' ? 'rgba(0,210,255,0.6)' : 'rgba(0,232,255,0.7)';
    ctx.shadowBlur  = 22;
    ctx.fillText(text, canvasW / 2, canvasH / 2);
    return canvas;
  }

  function createContactButtonCanvas(contact) {
    const W = 360, H = 130;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    // 背景
    const rnd = 24;
    ctx.clearRect(0, 0, W, H);
    ctx.beginPath();
    ctx.moveTo(rnd, 0); ctx.lineTo(W - rnd, 0);
    ctx.quadraticCurveTo(W, 0, W, rnd);
    ctx.lineTo(W, H - rnd); ctx.quadraticCurveTo(W, H, W - rnd, H);
    ctx.lineTo(rnd, H); ctx.quadraticCurveTo(0, H, 0, H - rnd);
    ctx.lineTo(0, rnd); ctx.quadraticCurveTo(0, 0, rnd, 0);
    ctx.closePath();
    ctx.fillStyle = 'rgba(0,12,40,0.82)';
    ctx.fill();
    // 邊框
    ctx.strokeStyle = contact.accent || 'rgba(0,180,255,0.7)';
    ctx.lineWidth   = 3;
    ctx.stroke();
    // 圖示
    ctx.font        = `${H * 0.52}px serif`;
    ctx.textAlign   = 'center';
    ctx.textBaseline= 'middle';
    ctx.fillStyle   = '#ffffff';
    ctx.fillText(contact.icon, H * 0.52, H / 2);
    // 文字
    ctx.font        = `bold ${H * 0.4}px 'Helvetica Neue',Arial,sans-serif`;
    ctx.textAlign   = 'left';
    ctx.fillStyle   = contact.accent || '#00ccff';
    ctx.shadowColor = contact.accent || '#00ccff';
    ctx.shadowBlur  = 14;
    ctx.fillText(contact.label, H * 1.1, H / 2);
    return canvas;
  }

  function mkARModule(indexedData) {
    const nameToRole = new Map();
    const ROLES = ['card', 'video'];
    // 以 JSON 的實際 .name 欄位為 key，配對角色；跳過 null（fetch 失敗的項目）
    indexedData.forEach((d, i) => {
      if (d && d.name && ROLES[i]) nameToRole.set(d.name, ROLES[i]);
    });

    let cardGroup, raccoonData = null, raccoonMesh = null;
    let videoGroup, videoMesh, videoEl, videoTex;
    let videoPlaying = false, videoHasInteracted = false, holoVisible = true;
    let raycaster, interactiveObjects = [], cameraRef, rendererRef;
    let profileMesh = null;

    const clock = new THREE.Clock();
    const scanEl = document.getElementById('scan-ov');
    const vpPanel = document.getElementById('video-panel');
    const vpIcon = document.getElementById('vp-icon');
    const vpTxt = document.getElementById('vp-txt');
    const S = { active: null };

    function clearAll() {
      if (cardGroup) cardGroup.visible = false;
      if (videoGroup) videoGroup.visible = false;
      vpPanel.classList.remove('show');
      if (videoEl) videoEl.pause();
      videoPlaying = false;
      vpIcon.textContent = '▶'; vpTxt.textContent = '點擊 播放影片';
      document.getElementById('bb-play').textContent = '▶ 播放';
      S.active = null;
    }

    function triggerInteraction(obj) {
      doFlash();
      const originalScale = obj.scale.x;

      if (obj === raccoonMesh) {
        // 浣熊可愛反應（local position，model 為 cardGroup 子物件）
        const baseY = 0.38;
        let rot = 0;
        const anim = setInterval(() => {
          rot += 0.28;
          obj.rotation.y = rot;
          obj.position.y = baseY + 0.18 * Math.sin(rot * 3);
          if (rot > Math.PI * 2.2) {
            clearInterval(anim);
            obj.rotation.y = 0;
            obj.position.y = baseY;
          }
        }, 16);
        showToast('🦝 浣熊跟你打招呼～');
      } 
      else if (obj === profileMesh) {
        obj.scale.setScalar(originalScale * 1.35);
        setTimeout(() => obj.scale.setScalar(originalScale), 200);
        showToast('👤 這是我的頭像');
      } 
      else if (obj.userData.url) {
        obj.scale.setScalar(originalScale * 0.82);
        setTimeout(() => obj.scale.setScalar(originalScale), 150);
        window.open(obj.userData.url, '_blank', 'noopener');
        showToast(obj.userData.type === 'social' ? '開啟社群' : '開啟聯絡');
      }
    }

    function create3DNameCardUI() {
      const loader = new THREE.TextureLoader();

      if (raccoonData?.model) {
        raccoonMesh = raccoonData.model;
        raccoonMesh.position.set(-0.72, 0.38, 0.06);
        raccoonMesh.scale.setScalar(0.138);
        interactiveObjects.push(raccoonMesh);
      }

      // 頭像
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = canvas.height = 380;
        const ctx = canvas.getContext('2d');
        ctx.save();
        ctx.beginPath();
        ctx.arc(190, 190, 160, 0, Math.PI*2);
        ctx.clip();
        ctx.drawImage(img, 0, 0, 380, 380);
        ctx.restore();
        ctx.shadowColor = '#00f0ff';
        ctx.shadowBlur = 28;
        ctx.lineWidth = 24;
        ctx.strokeStyle = 'rgba(0,240,255,0.85)';
        ctx.beginPath();
        ctx.arc(190, 190, 178, 0, Math.PI*2);
        ctx.stroke();

        const tex = new THREE.CanvasTexture(canvas);
        profileMesh = new THREE.Mesh(
          new THREE.PlaneGeometry(0.42, 0.42),
          new THREE.MeshBasicMaterial({map: tex, transparent: true, side: THREE.DoubleSide})
        );
        profileMesh.position.set(0.78, 0.85, 0.16);
        interactiveObjects.push(profileMesh);
        cardGroup.add(profileMesh);
      };
      img.src = AR_CONFIG.profile.photo;

      // 姓名與職稱（位置已上移）
      const nameMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(0.72, 0.16),
        new THREE.MeshBasicMaterial({map: new THREE.CanvasTexture(createTextCanvas(AR_CONFIG.profile.name, 118, 680, 145)), transparent: true, side: THREE.DoubleSide})
      );
      nameMesh.position.set(0.78, 0.62, 0.14);
      cardGroup.add(nameMesh);

      const titleMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(0.62, 0.09),
        new THREE.MeshBasicMaterial({map: new THREE.CanvasTexture(createTextCanvas(AR_CONFIG.profile.title.toUpperCase(), 52, 520, 78, '#00e8ff')), transparent: true, side: THREE.DoubleSide})
      );
      titleMesh.position.set(0.78, 0.50, 0.135);
      cardGroup.add(titleMesh);

      // 聯絡按鈕
      AR_CONFIG.contacts.forEach((contact, i) => {
        const btnCanvas = createContactButtonCanvas(contact);
        const mesh = new THREE.Mesh(
          new THREE.PlaneGeometry(0.72, 0.28),
          new THREE.MeshBasicMaterial({map: new THREE.CanvasTexture(btnCanvas), transparent: true, side: THREE.DoubleSide})
        );
        mesh.position.set(0.68, 0.31 - i * 0.32, 0.115);
        mesh.userData = { type: 'contact', url: contact.url };
        interactiveObjects.push(mesh);
        cardGroup.add(mesh);
      });

      // 社群 ICON
      const socialStartX = -0.78;
      AR_CONFIG.socials.forEach((soc, i) => {
        loader.load(soc.img, (tex) => {
          const mesh = new THREE.Mesh(
            new THREE.PlaneGeometry(0.265, 0.265),
            new THREE.MeshBasicMaterial({map: tex, transparent: true, side: THREE.DoubleSide})
          );
          mesh.position.set(socialStartX + i * 0.36, -0.52, 0.11);
          mesh.userData = { type: 'social', url: soc.url };
          interactiveObjects.push(mesh);
          cardGroup.add(mesh);
        });
      });
    }

    function setupRaycaster() {
      raycaster = new THREE.Raycaster();
      document.addEventListener('touchstart', (e) => {
        if (S.active !== 'card' || !cardGroup.visible) return;
        const touch = e.touches[0];
        const rect = rendererRef.domElement.getBoundingClientRect();
        const x = ((touch.clientX - rect.left) / rect.width) * 2 - 1;
        const y = -((touch.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(new THREE.Vector2(x, y), cameraRef);
        const intersects = raycaster.intersectObjects(interactiveObjects, true);
        if (intersects.length > 0) {
          let obj = intersects[0].object;
          while (obj && !interactiveObjects.includes(obj)) obj = obj.parent;
          if (obj) triggerInteraction(obj);
        }
      }, { passive: false });
    }

    // ==================== 主要邏輯 ====================
    return {
      name: 'ar-card',
      onStart() {
        const { scene, renderer, camera } = XR8.Threejs.xrScene();
        rendererRef = renderer; cameraRef = camera;
        renderer.autoClear = false;
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight, false);

        scene.add(new THREE.AmbientLight(0xffffff, 1.35));
        const dir = new THREE.DirectionalLight(0xffffff, 0.95);
        dir.position.set(1, 3, 2); scene.add(dir);

        cardGroup = new THREE.Group(); cardGroup.visible = false; scene.add(cardGroup);

        const ldr = new THREE.GLTFLoader();
        ldr.load(AR_CONFIG.raccoonSrc, gltf => {
          const model = gltf.scene;
          const mixer = new THREE.AnimationMixer(model);
          gltf.animations.forEach(c => mixer.clipAction(c).play());
          model.scale.setScalar(0.138);
          model.position.set(-0.72, 0.38, 0.06);
          cardGroup.add(model);
          raccoonData = {model, mixer};
          create3DNameCardUI();
          setupRaycaster();
        });

        // 影片修復
        videoGroup = new THREE.Group(); videoGroup.visible = false; scene.add(videoGroup);
        videoEl = document.createElement('video');
        videoEl.src = AR_CONFIG.videoSrc;
        videoEl.loop = true;
        videoEl.muted = true;
        videoEl.playsInline = true;
        videoEl.crossOrigin = 'anonymous';
        videoEl.load();

        videoTex = new THREE.VideoTexture(videoEl);
        videoTex.minFilter = videoTex.magFilter = THREE.LinearFilter;
        videoMesh = new THREE.Mesh(
          new THREE.PlaneGeometry(1.5, 0.84375),
          new THREE.MeshBasicMaterial({map: videoTex, side: THREE.DoubleSide})
        );
        videoGroup.add(videoMesh);

        // 底部按鈕
        document.getElementById('bb-play').addEventListener('click', () => {
          if (S.active !== 'video' || !videoEl) return showToast('請掃描背面');
          if (videoPlaying) {
            videoEl.pause(); videoPlaying = false;
            vpIcon.textContent = '▶'; vpTxt.textContent = '點擊 播放影片';
            document.getElementById('bb-play').textContent = '▶ 播放';
          } else {
            videoEl.play().then(() => {
              videoPlaying = true; videoHasInteracted = true;
              vpIcon.textContent = '⏸'; vpTxt.textContent = '點擊 暫停影片';
              document.getElementById('bb-play').textContent = '⏸ 暫停';
            });
          }
        });

        document.getElementById('bb-mute').addEventListener('click', () => {
          if (videoEl) {
            videoEl.muted = !videoEl.muted;
            document.getElementById('bb-mute').textContent = videoEl.muted ? '🔇 靜音' : '🔊 聲音';
          }
        });

        document.getElementById('bb-holo').addEventListener('click', () => {
          holoVisible = !holoVisible;
          if (cardGroup) cardGroup.visible = holoVisible && S.active === 'card';
          document.getElementById('bb-holo').classList.toggle('active', holoVisible);
          showToast(holoVisible ? '🔷 全息 ON' : '🔲 全息 OFF');
        });

        document.getElementById('vp-play-btn').addEventListener('click', () => document.getElementById('bb-play').click());

        clock.start();
        setTimeout(() => showSt('請對準名片正面或背面', 6000), 800);
      },

      onUpdate() {
        const delta = clock.getDelta();
        if (raccoonData?.mixer) raccoonData.mixer.update(delta);
        if (raccoonData?.model && cardGroup.visible) {
          raccoonData.model.position.y = 0.38 + Math.sin(clock.elapsedTime * 1.35) * 0.032;
        }
        if (videoTex && videoPlaying) videoTex.needsUpdate = true;
      },

      listeners: [
        {event: 'reality.imagefound', process: ({detail}) => {
          const role = nameToRole.get(detail.name);
          if (!role) return;
          scanEl.classList.add('hidden');
          // 若切換到不同角色才清除，避免同一目標重新識別時閃爍
          if (S.active !== role) clearAll();
          if (role === 'card') {
            cardGroup.position.copy(detail.position);
            cardGroup.quaternion.copy(detail.rotation);
            cardGroup.scale.setScalar(detail.scale);
            cardGroup.visible = true;
            S.active = 'card';
            doFlash();
            showSt('🦝 3D 名片已浮現', 1800);
          } else if (role === 'video') {
            videoGroup.position.copy(detail.position);
            videoGroup.quaternion.copy(detail.rotation);
            videoGroup.scale.setScalar(detail.scale);
            videoGroup.visible = true;
            vpPanel.classList.add('show');
            S.active = 'video';
            doFlash();
            if (!videoHasInteracted) videoEl.play().catch(() => {});
          }
        }},
        {event: 'reality.imageupdated', process: ({detail}) => {
          const role = nameToRole.get(detail.name);
          if (!role || role !== S.active) return;
          if (role === 'card' && cardGroup) {
            cardGroup.position.copy(detail.position);
            cardGroup.quaternion.copy(detail.rotation);
            cardGroup.scale.setScalar(detail.scale);
          } else if (role === 'video' && videoGroup) {
            videoGroup.position.copy(detail.position);
            videoGroup.quaternion.copy(detail.rotation);
            videoGroup.scale.setScalar(detail.scale);
          }
        }},
        {event: 'reality.imagelost', process: ({detail}) => {
          // 只有當消失的目標正好是目前 active 的那個才清除，防止兩個目標互相干擾
          const role = nameToRole.get(detail.name);
          if (!role || role !== S.active) return;
          scanEl.classList.remove('hidden');
          clearAll();
        }}
      ]
    };
  }

  // ==================== MAIN ====================
  let _xrReady = false, _loadResult = null;
  window.addEventListener('xrloaded', () => _xrReady = true);

  async function loadTargets() {
    const indexed = [];
    for (const path of AR_CONFIG.targetJsonPaths) {
      try {
        const r = await fetch(path);
        // 保留 null 佔位，確保 index 與 ROLES 對應正確
        indexed.push(r.ok ? JSON.parse(await r.text()) : null);
      } catch(e) { indexed.push(null); }
    }
    _loadResult = {valid: indexed.filter(Boolean), indexed};
  }

  async function startXR8() {
    showSt('AR 載入中…', 6000);
    let w = 0;
    while ((!_loadResult || !_xrReady) && w < 12000) {
      await new Promise(r => setTimeout(r, 200)); w += 200;
    }
    if (!_loadResult?.valid?.length || !_xrReady) return showSt('❌ AR 初始化失敗，請重新整理', 8000);

    XR8.XrController.configure({disableWorldTracking: true, imageTargetData: _loadResult.valid});
    XR8.addCameraPipelineModules([
      XR8.GlTextureRenderer.pipelineModule(),
      XR8.Threejs.pipelineModule(),
      XR8.XrController.pipelineModule(),
      mkARModule(_loadResult.indexed)
    ]);
    XR8.run({canvas: document.getElementById('renderCanvas')});
  }

  (() => {
    const overlay = document.createElement('div');
    Object.assign(overlay.style, {position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:9999,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'16px',background:'rgba(0,4,16,.95)',cursor:'pointer'});
    overlay.innerHTML = `<div style="font-size:48px;animation:pulse 2s infinite">🦝</div><div style="font-family:monospace;font-size:14px;letter-spacing:3px;color:rgba(0,200,255,.85)">AR BUSINESS CARD<br><span style="font-size:11px;opacity:.6">TAP TO START</span></div>`;
    overlay.addEventListener('click', async () => {
      overlay.remove();
      try {
        if (DeviceMotionEvent?.requestPermission) await DeviceMotionEvent.requestPermission();
        if (DeviceOrientationEvent?.requestPermission) await DeviceOrientationEvent.requestPermission();
      } catch(e) {}
      startXR8();
    }, {once: true});
    document.body.appendChild(overlay);
    loadTargets();
  })();
  </script>
</body>
</html>
