<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>AR Business Card PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- libs -->
<script src="https://cdn.jsdelivr.net/gh/isaoinvest/ar-libs/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/isaoinvest/ar-libs/aframe-extras.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/isaoinvest/ar-libs/mindar-image-aframe.prod.js"></script>
<script src="https://cdn.jsdelivr.net/gh/isaoinvest/ar-libs/gsap.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="./external/xr/xr.js"></script>

<style>
body{margin:0;background:#000;overflow:hidden}
#renderCanvas{position:fixed;width:100vw;height:100vh}
#video-panel{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:10;
  opacity:0;
  transition:0.3s;
}
#video-panel.show{opacity:1}
.vp-btn{
  padding:10px 20px;
  background:rgba(0,0,0,0.7);
  color:#0ff;
  border-radius:30px;
  font-family:monospace;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="renderCanvas"></canvas>

<div id="video-panel">
  <div class="vp-btn" id="playBtn">▶ 播放影片</div>
</div>

<script>

// ===== CONFIG =====
const AR_CONFIG = {
  targetJsonPaths: [
    './image-targets/isaofront.json',
    './image-targets/isaoback.json'
  ],
  videoSrc: 'https://pub-ac80c6d0a305452bbe0bdfcec65b6a2c.r2.dev/NEWS.mp4',
  raccoonSrc: 'https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/band-example/raccoon/scene.gltf',

  profile:{
    name:"MingHsun Li",
    title:"Red Panda Keeper"
  },

  contacts:[
    {label:'Website',url:'https://isaoinvest.com'},
    {label:'Email',url:'mailto:isaoinvest@gmail.com'},
    {label:'Phone',url:'tel:+886920820259'}
  ]
};

// ===== GLOBAL =====
let cardGroup, videoGroup;
let videoEl, videoTex;
let mixer;
let interactables=[];
let raycaster=new THREE.Raycaster();
let cameraRef;

// ===== UI 建立 =====
function createTextPlane(text,size=0.3){
  const canvas=document.createElement('canvas');
  canvas.width=512; canvas.height=128;
  const ctx=canvas.getContext('2d');

  ctx.fillStyle="#fff";
  ctx.font="bold 50px sans-serif";
  ctx.fillText(text,20,70);

  const tex=new THREE.CanvasTexture(canvas);

  return new THREE.Mesh(
    new THREE.PlaneGeometry(size,size*0.25),
    new THREE.MeshBasicMaterial({map:tex,transparent:true})
  );
}

function createButton(label,url,y){
  const canvas=document.createElement('canvas');
  canvas.width=512; canvas.height=128;
  const ctx=canvas.getContext('2d');

  ctx.fillStyle="rgba(0,0,80,0.8)";
  ctx.fillRect(0,0,512,128);

  ctx.fillStyle="#0ff";
  ctx.font="40px sans-serif";
  ctx.fillText(label,30,75);

  const tex=new THREE.CanvasTexture(canvas);

  const mesh=new THREE.Mesh(
    new THREE.PlaneGeometry(0.8,0.2),
    new THREE.MeshBasicMaterial({map:tex,transparent:true})
  );

  mesh.position.set(0,y,0.1);
  interactables.push({mesh,url});
  return mesh;
}

// ===== MODULE =====
function mkARModule(){

  function applyPose(group,detail){
    group.position.set(detail.position.x,detail.position.y,detail.position.z);
    group.quaternion.set(detail.rotation.x,detail.rotation.y,detail.rotation.z,detail.rotation.w);
    group.scale.setScalar(detail.scale);
  }

  function handleClick(x,y){
    const rect=document.getElementById('renderCanvas').getBoundingClientRect();
    const ndcX=(x/rect.width)*2-1;
    const ndcY=-(y/rect.height)*2+1;

    raycaster.setFromCamera({x:ndcX,y:ndcY},cameraRef);

    const hits=raycaster.intersectObjects(interactables.map(i=>i.mesh));
    if(!hits.length) return;

    const obj=interactables.find(i=>i.mesh===hits[0].object);
    if(obj) window.open(obj.url);
  }

  window.addEventListener('click',e=>handleClick(e.clientX,e.clientY));

  return {
    name:'ar-ui',

    onStart(){
      const {scene,camera,renderer}=XR8.Threejs.xrScene();
      cameraRef=camera;

      renderer.outputEncoding=THREE.sRGBEncoding;

      scene.add(new THREE.AmbientLight(0xffffff,1));

      // ===== CARD =====
      cardGroup=new THREE.Group();
      cardGroup.visible=false;
      scene.add(cardGroup);

      const name=createTextPlane(AR_CONFIG.profile.name);
      name.position.set(0,0.3,0.1);
      cardGroup.add(name);

      const title=createTextPlane(AR_CONFIG.profile.title,0.25);
      title.position.set(0,0.15,0.1);
      cardGroup.add(title);

      AR_CONFIG.contacts.forEach((c,i)=>{
        cardGroup.add(createButton(c.label,c.url,-i*0.25));
      });

      // raccoon
      const loader=new THREE.GLTFLoader();
      loader.load(AR_CONFIG.raccoonSrc,gltf=>{
        const model=gltf.scene;
        model.scale.set(0.1,0.1,0.1);
        model.position.set(-0.3,0,0);
        cardGroup.add(model);

        mixer=new THREE.AnimationMixer(model);
        gltf.animations.forEach(a=>mixer.clipAction(a).play());
      });

      // ===== VIDEO =====
      videoGroup=new THREE.Group();
      videoGroup.visible=false;
      scene.add(videoGroup);

      videoEl=document.createElement('video');
      videoEl.src=AR_CONFIG.videoSrc;
      videoEl.loop=true;
      videoEl.muted=true;
      videoEl.playsInline=true;

      videoTex=new THREE.VideoTexture(videoEl);

      const plane=new THREE.Mesh(
        new THREE.PlaneGeometry(1.5,0.9),
        new THREE.MeshBasicMaterial({map:videoTex})
      );

      videoGroup.add(plane);

      document.getElementById('playBtn').onclick=()=>{
        if(videoEl.paused) videoEl.play();
        else videoEl.pause();
      };
    },

    onUpdate(){
      if(mixer) mixer.update(0.016);
    },

    listeners:[
      {
        event:'reality.imagefound',
        process:({detail})=>{
          if(detail.name.includes('front')){
            cardGroup.visible=true;
            applyPose(cardGroup,detail);
          }else{
            videoGroup.visible=true;
            applyPose(videoGroup,detail);
            videoEl.play();
            document.getElementById('video-panel').classList.add('show');
          }
        }
      },
      {
        event:'reality.imageupdated',
        process:({detail})=>{
          if(detail.name.includes('front')){
            applyPose(cardGroup,detail);
          }else{
            applyPose(videoGroup,detail);
          }
        }
      },
      {
        event:'reality.imagelost',
        process:()=>{
          cardGroup.visible=false;
          videoGroup.visible=false;
          videoEl.pause();
          document.getElementById('video-panel').classList.remove('show');
        }
      }
    ]
  }
}

// ===== START =====
function startXR(){

  XR8.XrController.configure({
    disableWorldTracking:true
  });

  XR8.addCameraPipelineModules([
    XR8.GlTextureRenderer.pipelineModule(),
    XR8.Threejs.pipelineModule(),
    XR8.XrController.pipelineModule(),
    mkARModule()
  ]);

  XR8.run({
    canvas:document.getElementById('renderCanvas')
  });
}

window.onload=startXR;

</script>

</body>
</html>
