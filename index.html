  <style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;-webkit-user-select:none;user-select:none}
  #renderCanvas{position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;z-index:0;display:block}
  /* ★ visibility:hidden 非 display:none — 防止 iOS 停止 XR8 內部相機 video 解碼 */

  <script>
  // ═══════════════════════════════════════════════════════
  // DEBUG
  // ═══════════════════════════════════════════════════════
  const D = {
    el: null,
    lines: 0,
    init() {
      this.el = document.getElementById('dbg');
      document.getElementById('bb-dbg').addEventListener('click', () => {
        const showing = this.el.classList.toggle('show');
        document.getElementById('bb-dbg').classList.toggle('active', showing);
      });
      window.addEventListener('error', e => this.log('JS ERROR: ' + e.message + ' L:' + e.lineno, 'err'));
      window.addEventListener('unhandledrejection', e => this.log('PROMISE: ' + String(e.reason), 'err'));
    },
    log(m, t = 'inf') {
      if (!this.el) { console.log(t, m); return; }
      this.lines++;
      const d = document.createElement('div');
      d.className = t;
      d.textContent = '[' + String(this.lines).padStart(3,'0') + '] ' + new Date().toLocaleTimeString('zh-TW') + ' ' + m;
      this.el.appendChild(d);
      this.el.scrollTop = this.el.scrollHeight;
    },
    section(title) {
      if (!this.el) return;
      const h = document.createElement('h3');
      h.textContent = '── ' + title + ' ──';
      this.el.appendChild(h);
    },
    json(label, obj) {
      if (!this.el) return;
      const d = document.createElement('div');
      d.className = 'json';
      d.textContent = label + ': ' + JSON.stringify(obj, null, 2);
      this.el.appendChild(d);
    }
  };
  D.init();

  // ═══════════════════════════════════════════════════════
  // UI HELPERS
  // ═══════════════════════════════════════════════════════
  let _stT, _toastT;
  function showSt(msg, dur = 3000) {
    const e = document.getElementById('status');
    e.textContent = msg; e.classList.add('show');
    clearTimeout(_stT); _stT = setTimeout(() => e.classList.remove('show'), dur);
  }
  function showToast(msg) {
    const e = document.getElementById('toast');
    e.textContent = msg; e.classList.add('show');
    clearTimeout(_toastT); _toastT = setTimeout(() => e.classList.remove('show'), 1800);
  }
  function doFlash() {
    const f = document.getElementById('flash');
    f.classList.add('on'); setTimeout(() => f.classList.remove('on'), 700);
  }

  // ═══════════════════════════════════════════════════════
  // PREFLIGHT — 詳細檢查所有資源
  // ═══════════════════════════════════════════════════════
  async function preflight() {
    D.section('PREFLIGHT');

    const resources = [
      { url: './external/xr/xr.js',      label: 'xr.js' },
      { url: './external/xr/xr-slam.js', label: 'xr-slam.js ← 相機核心' },
      ...AR_CONFIG.targetJsonPaths.map((p, i) => ({ url: p, label: `target[${i}]: ${p}` })),
    ];

    for (const { url, label } of resources) {
      try {
        const r = await fetch(url, { method: 'HEAD' });
        if (r.ok) {
          D.log(`✅ ${label} (${r.status})`, 'ok');
        } else {
          D.log(`❌ ${label} → HTTP ${r.status}`, 'err');
        }
      } catch (e) {
        D.log(`❌ ${label} → ${e.message}`, 'err');
      }
    }
  }

  // ═══════════════════════════════════════════════════════
  // LOAD & INSPECT TARGET JSONs
  // ═══════════════════════════════════════════════════════
  async function loadAndInspectTargets() {
    D.section('TARGET JSON INSPECT');
    const loaded = [];

    for (const [i, path] of AR_CONFIG.targetJsonPaths.entries()) {
      try {
        const r = await fetch(path);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const raw = await r.text();
        let d;
        try { d = JSON.parse(raw); } catch(pe) { throw new Error('JSON parse: ' + pe.message); }

        // ★★★ 完整列印 JSON 結構（去掉大型 base64/binary 欄位）
        const safe = JSON.parse(JSON.stringify(d));
        // 截斷可能的 base64 圖片欄位
        const truncFields = ['imageData','data','pixels','buffer','image'];
        function truncate(obj, depth=0) {
          if (depth > 5 || !obj || typeof obj !== 'object') return;
          for (const k of Object.keys(obj)) {
            if (truncFields.includes(k) && typeof obj[k] === 'string' && obj[k].length > 80) {
              obj[k] = obj[k].substring(0,60) + '…[' + obj[k].length + ' chars]';
            } else if (Array.isArray(obj[k]) && obj[k].length > 10) {
              obj[k] = ['…Array[' + obj[k].length + ']'];
            } else if (typeof obj[k] === 'object') {
              truncate(obj[k], depth+1);
            }
          }
        }
        truncate(safe);

        D.log(`✅ target[${i}] 載入成功`, 'ok');
        D.log(`   .name = "${d.name}"`, 'ok');
        D.log(`   .type = ${d.type || '(missing)'}`, d.type ? 'inf' : 'err');
        D.log(`   .imagePath = ${d.imagePath || '(missing)'}`, d.imagePath ? 'inf' : 'warn');
        D.log(`   頂層keys: ${Object.keys(d).join(', ')}`, 'inf');
        if (d.properties) {
          D.log(`   properties: ${JSON.stringify(d.properties).substring(0,120)}`, 'inf');
        }
        D.json(`   [${i}] FULL`, safe);

        loaded.push(d);
      } catch (e) {
        D.log(`❌ target[${i}] (${path}): ${e.message}`, 'err');
        loaded.push(null);
      }
    }
    return loaded;
  }

  // ═══════════════════════════════════════════════════════
  // 3D CANVAS HELPERS
  // ═══════════════════════════════════════════════════════
  function rrect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();
  }

  function mkCanvasMesh(pw, ph, tw, th, drawFn) {
    const cv = document.createElement('canvas');
    cv.width = tw; cv.height = th;
    drawFn(cv.getContext('2d'), tw, th);
    const tex = new THREE.CanvasTexture(cv);
    tex.minFilter = tex.magFilter = THREE.LinearFilter;
    const mesh = new THREE.Mesh(
      new THREE.PlaneGeometry(pw, ph),
      new THREE.MeshBasicMaterial({ map:tex, transparent:true, side:THREE.DoubleSide, toneMapped:false, depthWrite:false })
    );
    mesh.renderOrder = 999;
    return mesh;
  }

  function mkCirclePhoto(size, url, cb) {
    const SZ = 256;
    const img = new Image(); img.crossOrigin = 'anonymous';
    img.onload = () => {
      const cv = document.createElement('canvas'); cv.width = cv.height = SZ;
      const ctx = cv.getContext('2d');
      ctx.beginPath(); ctx.arc(SZ/2,SZ/2,SZ/2-4,0,Math.PI*2); ctx.clip();
      ctx.drawImage(img, 0, 0, SZ, SZ);
      ctx.beginPath(); ctx.arc(SZ/2,SZ/2,SZ/2-4,0,Math.PI*2);
      ctx.strokeStyle='rgba(0,190,255,0.8)'; ctx.lineWidth=7; ctx.stroke();
      const tex = new THREE.CanvasTexture(cv);
      tex.minFilter = tex.magFilter = THREE.LinearFilter;
      const mesh = new THREE.Mesh(
        new THREE.PlaneGeometry(size, size),
        new THREE.MeshBasicMaterial({ map:tex, transparent:true, side:THREE.DoubleSide, toneMapped:false, depthWrite:false })
      );
      mesh.renderOrder = 999;
      cb(mesh);
    };
    img.src = url;
  }

  // ═══════════════════════════════════════════════════════
  // BUILD 3D CARD CONTENT
  // ═══════════════════════════════════════════════════════
  function buildCardContent(group, interactables) {
    const Z = 0.06;

    // 背景
    group.add((() => {
      const m = mkCanvasMesh(1.02, 0.80, 512, 410, (ctx, W, H) => {
        ctx.clearRect(0,0,W,H);
        rrect(ctx,2,2,W-4,H-4,28);
        ctx.fillStyle='rgba(0,6,22,0.88)'; ctx.fill();
        ctx.strokeStyle='rgba(0,180,255,0.42)'; ctx.lineWidth=2; ctx.stroke();
        const g=ctx.createLinearGradient(0,0,W,0);
        g.addColorStop(0,'rgba(0,170,255,0)'); g.addColorStop(0.4,'rgba(0,210,255,0.75)');
        g.addColorStop(0.6,'rgba(0,210,255,0.75)'); g.addColorStop(1,'rgba(0,170,255,0)');
        ctx.fillStyle=g; ctx.fillRect(2,2,W-4,2.5);
      });
      m.position.set(0,0,Z-0.01); return m;
    })());

    // 姓名
    const nm = mkCanvasMesh(0.46,0.085,512,96,(ctx,W,H)=>{
      ctx.clearRect(0,0,W,H);
      ctx.shadowColor='rgba(0,210,255,0.65)'; ctx.shadowBlur=16;
      ctx.fillStyle='rgba(228,248,255,1)';
      ctx.font=`bold ${Math.round(H*0.60)}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(AR_CONFIG.profile.name, W/2, H/2);
    });
    nm.position.set(0.25, 0.10, Z); group.add(nm);

    // 職稱
    const tm = mkCanvasMesh(0.44,0.052,512,56,(ctx,W,H)=>{
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle='rgba(0,175,255,0.85)';
      ctx.font=`${Math.round(H*0.55)}px monospace`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(AR_CONFIG.profile.title.toUpperCase(), W/2, H/2);
    });
    tm.position.set(0.25, 0.025, Z); group.add(tm);

    // 分隔線
    const dv = mkCanvasMesh(0.88,0.005,256,3,(ctx,W,H)=>{
      const g=ctx.createLinearGradient(0,0,W,0);
      g.addColorStop(0,'rgba(0,190,255,0)'); g.addColorStop(0.3,'rgba(0,190,255,0.45)');
      g.addColorStop(0.7,'rgba(0,190,255,0.45)'); g.addColorStop(1,'rgba(0,190,255,0)');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    });
    dv.position.set(0,-0.06,Z); group.add(dv);

    // 聯絡按鈕
    AR_CONFIG.contacts.forEach((c, i) => {
      const btn = mkCanvasMesh(0.86,0.098,512,58,(ctx,W,H)=>{
        ctx.clearRect(0,0,W,H);
        rrect(ctx,1,1,W-2,H-2,H*0.3);
        ctx.fillStyle='rgba(0,18,50,0.78)'; ctx.fill();
        ctx.strokeStyle='rgba(0,150,255,0.2)'; ctx.lineWidth=1.2; ctx.stroke();
        rrect(ctx,1,1,6,H-2,3); ctx.fillStyle=c.accent; ctx.fill();
        ctx.fillStyle='rgba(218,244,255,0.95)';
        ctx.font=`${Math.round(H*0.52)}px sans-serif`;
        ctx.textAlign='left'; ctx.textBaseline='middle';
        ctx.fillText(c.icon, H*0.44, H*0.5);
        ctx.font=`${Math.round(H*0.38)}px sans-serif`;
        ctx.fillStyle='rgba(185,228,255,0.92)';
        ctx.fillText(c.label, H*1.25, H*0.5);
        ctx.font=`${Math.round(H*0.30)}px monospace`;
        ctx.textAlign='right'; ctx.fillStyle='rgba(0,155,255,0.38)';
        ctx.fillText('›', W-H*0.35, H*0.5);
      });
      btn.position.set(-0.01, -0.155 - i*0.115, Z);
      group.add(btn);
      interactables.push({ mesh:btn, url:c.url, label:c.label });
    });

    // 社群圖示
    const socXs = [-0.29, -0.1, 0.09, 0.28];
    AR_CONFIG.socials.forEach((s, i) => {
      const fb = mkCanvasMesh(0.135,0.135,128,128,(ctx,W,H)=>{
        rrect(ctx,2,2,W-4,H-4,16);
        ctx.fillStyle='rgba(0,20,55,0.82)'; ctx.fill();
        ctx.strokeStyle='rgba(0,140,255,0.28)'; ctx.lineWidth=1.5; ctx.stroke();
        ctx.fillStyle='rgba(0,175,255,0.75)';
        ctx.font=`bold ${Math.round(W*0.42)}px sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(s.label[0], W/2, H/2);
      });
      fb.position.set(socXs[i], -0.59, Z);
      group.add(fb);
      interactables.push({ mesh:fb, url:s.url, label:s.label });
      // async load real icon
      const loader = new THREE.TextureLoader(); loader.crossOrigin='anonymous';
      loader.load(s.img, tex => {
        tex.minFilter=tex.magFilter=THREE.LinearFilter;
        fb.material.map=tex; fb.material.color.set(0xffffff); fb.material.needsUpdate=true;
      });
    });

    // 頭像
    mkCirclePhoto(0.22, AR_CONFIG.profile.photo, mesh => {
      mesh.position.set(0.28, 0.22, Z+0.005);
      group.add(mesh);
    });
  }

  // ═══════════════════════════════════════════════════════
  // RACCOON
  // ═══════════════════════════════════════════════════════
  function loadRaccoon(group, onLoaded) {
    const loader = new THREE.GLTFLoader();
    D.log('🦝 開始載入浣熊 GLTF…', 'inf');
    loader.load(
      AR_CONFIG.raccoonSrc,
      gltf => {
        const model = gltf.scene;
        const mixer = new THREE.AnimationMixer(model);
        gltf.animations.forEach(c => mixer.clipAction(c).play());
        model.scale.setScalar(0.09);
        model.position.set(-0.33, -0.14, 0);
        group.add(model);
        D.log('✅ 浣熊載入完成，動畫×' + gltf.animations.length, 'ok');
        onLoaded({ model, mixer });
      },
      undefined,
      err => D.log('❌ GLTF 失敗: ' + (err.message||err), 'err')
    );
  }

  // ═══════════════════════════════════════════════════════
  // AR MODULE
  // ═══════════════════════════════════════════════════════
  function mkARModule(indexedData) {
    D.section('AR MODULE INIT');

    // ★★★ 正確的 role mapping 方法 ★★★
    // indexedData[0] → isaofront.json 內容（可能是 null）
    // indexedData[1] → isaoback.json  內容（可能是 null）
    // 用 index → role 建立 name → role 的 Map
    const nameToRole = new Map();
    const ROLE = ['card', 'video'];
    indexedData.forEach((d, i) => {
      if (d) {
        nameToRole.set(d.name, ROLE[i]);
        D.log(`★ name "${d.name}" → role "${ROLE[i]}"`, 'ok');
      } else {
        D.log(`⚠ index[${i}] 為 null（JSON載入失敗）→ role "${ROLE[i]}" 無法追蹤`, 'warn');
      }
    });

    if (nameToRole.size === 0) {
      D.log('❌ nameToRole 為空！所有 target 均無法偵測', 'err');
    }

    let cardGroup, raccoonData = null;
    let videoGroup, videoMesh, videoEl, videoTex;
    let videoPlaying = false, videoHasInteracted = false;
    let holoVisible = true;

    const interactables = [];
    const raycaster = new THREE.Raycaster();
    let _camera = null, _renderer = null;

    const clock = new THREE.Clock();
    const scanEl = document.getElementById('scan-ov');
    const vpPanel = document.getElementById('video-panel');
    const vpIcon  = document.getElementById('vp-icon');
    const vpTxt   = document.getElementById('vp-txt');
    const S = { cardVis:false, videoVis:false };

    // Raycaster
    function handleTap(cx, cy) {
      if (!S.cardVis || !_camera || interactables.length===0) return;
      const cvs = document.getElementById('renderCanvas');
      const rect = cvs.getBoundingClientRect();
      const nx = ((cx-rect.left)/rect.width)*2-1;
      const ny = -((cy-rect.top)/rect.height)*2+1;
      raycaster.setFromCamera({x:nx, y:ny}, _camera);
      const hits = raycaster.intersectObjects(interactables.map(i=>i.mesh), false);
      if (!hits.length) return;
      const item = interactables.find(i=>i.mesh===hits[0].object);
      if (!item) return;
      D.log('👆 3D tap → ' + item.label, 'ok');
      item.mesh.scale.set(1.12,1.12,1.12);
      setTimeout(()=>item.mesh.scale.set(1,1,1),180);
      showToast('▶ ' + item.label);
      setTimeout(()=>{
        if (item.url.startsWith('http')) window.open(item.url,'_blank','noopener');
        else window.location.href = item.url;
      }, 60);
    }

    // 底部按鈕
    function setupBtns() {
      document.getElementById('bb-play').addEventListener('click', ()=>{
        if (!videoEl) { showToast('請先掃描背面'); return; }
        if (videoPlaying) {
          videoEl.pause(); videoPlaying=false;
          vpIcon.textContent='▶'; vpTxt.textContent='點擊 播放影片';
          document.getElementById('bb-play').textContent='▶ 播放';
        } else {
          videoEl.play().then(()=>{
            videoPlaying=true;
            vpIcon.textContent='⏸'; vpTxt.textContent='點擊 暫停影片';
            document.getElementById('bb-play').textContent='⏸ 暫停';
          }).catch(e=>D.log('播放失敗:'+e.message,'err'));
        }
      });
      document.getElementById('bb-mute').addEventListener('click', ()=>{
        if (!videoEl) return;
        videoEl.muted = !videoEl.muted;
        document.getElementById('bb-mute').textContent = videoEl.muted ? '🔇 靜音' : '🔊 聲音';
      });
      document.getElementById('bb-holo').addEventListener('click', ()=>{
        holoVisible = !holoVisible;
        if (cardGroup) cardGroup.visible = S.cardVis && holoVisible;
        document.getElementById('bb-holo').classList.toggle('active', holoVisible);
        showToast(holoVisible ? '🔷 全息 ON' : '🔲 全息 OFF');
      });
      document.getElementById('vp-play-btn').addEventListener('click', e=>{
        e.stopPropagation();
        document.getElementById('bb-play').click();
      });
    }

    // Touch → raycaster（附在 window，判斷是否 canvas）
    window.addEventListener('touchend', e=>{
      const t = e.changedTouches[0]; if (!t) return;
      const el = document.elementFromPoint(t.clientX, t.clientY);
      if (el && (el.tagName==='CANVAS'||el.id==='renderCanvas')) {
        handleTap(t.clientX, t.clientY);
      }
    }, {passive:true});
    window.addEventListener('click', e=>{
      if (e.target.tagName==='CANVAS'||e.target.id==='renderCanvas') {
        handleTap(e.clientX, e.clientY);
      }
    });

    function applyPose(group, detail) {
      const {position:p,rotation:r,scale:s} = detail;
      group.position.set(p.x,p.y,p.z);
      group.quaternion.set(r.x,r.y,r.z,r.w);
      group.scale.setScalar(s);
    }

    // ★ onFound — 所有事件都完整記錄
    function onFound({detail}) {
      const name = detail.name;
      const role = nameToRole.get(name);

      D.log('═══ imagefound ═══', 'warn');
      D.log(`  name: "${name}"`, 'inf');
      D.log(`  role: ${role || 'UNKNOWN — 請確認 JSON .name 欄位'}`, role?'ok':'err');
      D.log(`  pos: x=${detail.position.x.toFixed(3)} y=${detail.position.y.toFixed(3)} z=${detail.position.z.toFixed(3)}`, 'inf');
      D.log(`  scale: ${detail.scale.toFixed(3)}`, 'inf');
      D.log(`  nameToRole has: ${[...nameToRole.keys()].join(', ')}`, 'inf');

      if (!role) {
        showSt('⚠ 偵測到未知 target: "' + name + '"', 5000);
        D.log('⚠ 已知 names: [' + [...nameToRole.keys()].join(', ') + ']', 'warn');
        D.log('⚠ 偵測到: "' + name + '" — 不在已知清單中', 'err');
        return;
      }

      doFlash();

      if (role === 'card') {
        applyPose(cardGroup, detail);
        cardGroup.visible = true; S.cardVis = true;
        scanEl.classList.add('hidden');
        showSt('🦝 正面鎖定！點擊 3D 按鈕聯絡', 4000);
        D.log('✅ cardGroup.visible = true', 'ok');
      } else if (role === 'video') {
        applyPose(videoGroup, detail);
        videoGroup.visible = true; S.videoVis = true;
        scanEl.classList.add('hidden');
        vpPanel.classList.add('show');
        if (!videoHasInteracted && videoEl) {
          videoEl.muted=true; videoEl.currentTime=0;
          videoEl.play().then(()=>{
            videoPlaying=true;
            vpIcon.textContent='⏸'; vpTxt.textContent='點擊 暫停影片';
          }).catch(()=>{});
        }
        showSt('🎬 背面！影片播放中');
        D.log('✅ videoGroup.visible = true', 'ok');
      }
    }

    function onUpdated({detail}) {
      const role = nameToRole.get(detail.name);
      if (role==='card') {
        applyPose(cardGroup, detail);
        if (!S.cardVis) { cardGroup.visible=true; S.cardVis=true; }
      } else if (role==='video') {
        applyPose(videoGroup, detail);
        if (!S.videoVis) { videoGroup.visible=true; S.videoVis=true; }
      }
    }

    function onLost({detail}) {
      const name=detail?.name||'';
      const role=nameToRole.get(name);
      D.log('📍 imagelost: "'+name+'" role='+role, 'inf');
      if (role==='card') { S.cardVis=false; cardGroup.visible=false; }
      else if (role==='video') {
        S.videoVis=false; videoGroup.visible=false;
        vpPanel.classList.remove('show');
        if (videoEl) { videoEl.pause(); videoPlaying=false; }
        vpIcon.textContent='▶'; vpTxt.textContent='點擊 播放影片';
        document.getElementById('bb-play').textContent='▶ 播放';
      }
      if (!S.cardVis && !S.videoVis) {
        scanEl.classList.remove('hidden');
        showSt('🔍 請對準名片正面或背面');
      }
    }

    return {
      name: 'ar-card-debug',

      onStart() {
        D.section('onStart');
        const {scene, renderer, camera} = XR8.Threejs.xrScene();
        _camera=camera; _renderer=renderer;

        // ★ 黑屏修復
        renderer.autoClear = false;
        renderer.sortObjects = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight, false);
        renderer.domElement.style.cssText =
          'position:fixed!important;top:0!important;left:0!important;'+
          'width:100vw!important;height:100vh!important;z-index:0!important;';

        D.log(`renderer: ${window.innerWidth}×${window.innerHeight} dpr=${window.devicePixelRatio.toFixed(2)}`, 'ok');
        D.log(`camera type: ${camera.type}`, 'inf');
        D.log(`autoClear: ${renderer.autoClear}`, 'ok');

        scene.add(new THREE.AmbientLight(0xffffff, 1.1));
        const dir = new THREE.DirectionalLight(0xffffff, 0.75);
        dir.position.set(0.5,2,1.5); scene.add(dir);

        // Card group
        cardGroup = new THREE.Group();
        cardGroup.visible = false;
        scene.add(cardGroup);
        loadRaccoon(cardGroup, data => { raccoonData=data; });
        buildCardContent(cardGroup, interactables);
        D.log('cardGroup created, interactables='+interactables.length, 'ok');

        // Video group
        videoGroup = new THREE.Group();
        videoGroup.visible = false;
        scene.add(videoGroup);

        videoEl = document.createElement('video');
        videoEl.src=AR_CONFIG.videoSrc; videoEl.loop=true; videoEl.muted=true;
        videoEl.playsInline=true; videoEl.crossOrigin='anonymous';
        videoEl.setAttribute('webkit-playsinline','true');
        videoEl.addEventListener('canplay', ()=>D.log('🎬 video canplay','ok'));
        videoEl.addEventListener('error', e=>D.log('🎬 video error: '+videoEl.error?.code,'err'));

        videoTex = new THREE.VideoTexture(videoEl);
        videoTex.minFilter=videoTex.magFilter=THREE.LinearFilter;
        videoTex.format=THREE.RGBAFormat;

        videoMesh = new THREE.Mesh(
          new THREE.PlaneGeometry(1.5, 1.5*(9/16)),
          new THREE.MeshBasicMaterial({map:videoTex, side:THREE.DoubleSide, toneMapped:false})
        );
        videoGroup.add(videoMesh);

        setupBtns();
        D.log('✅ Scene 完全初始化', 'ok');
        D.log('等待 imagefound 事件…', 'inf');
        clock.start();
        setTimeout(()=>showSt('請對準名片正面（浣熊）或背面（影片）',5000), 800);
      },

      onUpdate() {
        const delta = clock.getDelta();
        if (raccoonData?.mixer) raccoonData.mixer.update(delta);
        if (raccoonData?.model && cardGroup.visible) {
          raccoonData.model.position.y = -0.14 + Math.sin(clock.elapsedTime*1.2)*0.022;
        }
      },

      listeners: [
        {event:'reality.imagefound',   process:onFound},
        {event:'reality.imageupdated', process:onUpdated},
        {event:'reality.imagelost',    process:onLost},
      ],

      onAttach() {
        window.addEventListener('resize', ()=>{
          if (_renderer) _renderer.setSize(window.innerWidth, window.innerHeight, false);
        });
        document.addEventListener('visibilitychange', ()=>{
          if (document.hidden && videoEl) { videoEl.pause(); videoPlaying=false; }
          else if (S.videoVis && videoPlaying && videoEl) videoEl.play().catch(()=>{});
        });
      }
    };
  }

  // ═══════════════════════════════════════════════════════
  // MAIN
  // ═══════════════════════════════════════════════════════
  let _xrReady = false;
  let _loadResult = null;  // { valid:[], indexed:[] }

  window.addEventListener('xrloaded', ()=>{
    _xrReady = true;
    D.log('✅ xrloaded fired', 'ok');
  });

  async function loadTargets() {
    D.section('LOAD TARGETS');
    const indexed = await loadAndInspectTargets();
    const valid   = indexed.filter(Boolean);

    D.log(`載入結果: ${valid.length}/${indexed.length} 個有效`, valid.length===indexed.length?'ok':'warn');

    // ★★★ 關鍵 XR8 configure 方式 ★★★
    // 根據官方 README 和 migration guide：
    // XR8.XrController.configure({ imageTargetData: [jsonObj1, jsonObj2] })
    // jsonObj 必須是完整的 JSON 物件（直接 fetch 回來的 parsed object）
    // imagePath 欄位是相對於 index.html 的路徑，引擎會自行 fetch luminance image
    _loadResult = { valid, indexed };
    return valid.length > 0;
  }

  async function requestMotionPermissions() {
    for (const E of [DeviceMotionEvent, DeviceOrientationEvent]) {
      if (typeof E!=='undefined' && typeof E.requestPermission==='function') {
        try { await E.requestPermission(); } catch {}
      }
    }
  }

  async function startXR8() {
    D.section('START XR8');
    showSt('AR 初始化中…', 4000);

    // 等待 target JSON
    let w=0;
    while (!_loadResult && w<10000) { await new Promise(r=>setTimeout(r,200)); w+=200; }
    if (!_loadResult || _loadResult.valid.length===0) {
      D.log('❌ 無有效 target，中止', 'err');
      showSt('❌ 目標 JSON 載入失敗', 8000); return;
    }

    // 等待 xr.js
    w=0;
    while (!_xrReady && w<12000) { await new Promise(r=>setTimeout(r,200)); w+=200; }
    if (!_xrReady) { D.log('❌ xrloaded 超時','err'); showSt('❌ AR 引擎未就緒',8000); return; }

    const {valid, indexed} = _loadResult;

    D.section('XR8 CONFIGURE');
    D.log('imageTargetData count: ' + valid.length, 'ok');
    valid.forEach((d,i) => {
      D.log(`  [${i}] name="${d.name}" type=${d.type||'?'} imagePath=${d.imagePath||'MISSING'}`, 'inf');
    });

    // ★ 官方正確 configure 方式：
    // - disableWorldTracking: true（只做 image tracking）
    // - imageTargetData: 傳完整 JSON 物件陣列
    XR8.XrController.configure({
      disableWorldTracking: true,
      imageTargetData: valid,
    });
    D.log('XrController.configure() 完成', 'ok');

    XR8.addCameraPipelineModules([
      XR8.GlTextureRenderer.pipelineModule(),
      XR8.Threejs.pipelineModule(),
      XR8.XrController.pipelineModule(),
      mkARModule(indexed),
    ]);
    D.log('addCameraPipelineModules 完成', 'ok');

    XR8.run({canvas: document.getElementById('renderCanvas')});
    D.log('✅ XR8.run() 呼叫完成', 'ok');
  }

  document.getElementById('btn-start').addEventListener('click', async function() {
    D.section('USER START');
    D.log('開始按鈕點擊', 'ok');
    // 自動開啟 debug 面板
    document.getElementById('dbg').classList.add('show');
    document.getElementById('bb-dbg').classList.add('active');

    this.disabled=true; this.textContent='授權中…';
    await requestMotionPermissions();
    document.getElementById('perm-gate').classList.add('fade');
    setTimeout(()=>{ document.getElementById('perm-gate').style.display='none'; }, 700);
    await startXR8();
  });

  window.addEventListener('xrerror', e=>{
    D.log('❌ xrerror: '+JSON.stringify(e.detail), 'err');
    showSt('❌ AR 引擎錯誤: '+JSON.stringify(e.detail), 12000);
  });

  window.addEventListener('load', ()=>{
    D.section('PAGE LOAD');
    D.log('頁面載入完成，開始 preflight 檢查…', 'inf');
    preflight();
    loadTargets();
  });
  </script>
</body>
