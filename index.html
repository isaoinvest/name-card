<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>AR Business Card FINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="./external/xr/xr.js"></script>

<style>
body{margin:0;background:#000;overflow:hidden}
#renderCanvas{width:100vw;height:100vh}
#ui{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  color:#0ff;
  font-family:monospace;
}
</style>
</head>

<body>

<canvas id="renderCanvas"></canvas>
<div id="ui">點擊畫面可互動</div>

<script>

// ===== CONFIG =====
const CONFIG = {
  targets: './image-targets/targets.json',
  video: 'https://pub-ac80c6d0a305452bbe0bdfcec65b6a2c.r2.dev/NEWS.mp4',
  model: 'https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/band-example/raccoon/scene.gltf'
};

// ===== GLOBAL =====
let camera, scene;
let raycaster = new THREE.Raycaster();
let interactables = [];
let videoEl, videoTex, videoMesh;
let mixer;

// ===== UI =====
function makeButton(text, url, y){
  const c = document.createElement('canvas');
  c.width=512; c.height=128;
  const ctx = c.getContext('2d');

  ctx.fillStyle="rgba(0,0,80,0.8)";
  ctx.fillRect(0,0,512,128);

  ctx.fillStyle="#0ff";
  ctx.font="40px sans-serif";
  ctx.fillText(text,30,70);

  const tex = new THREE.CanvasTexture(c);

  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.8,0.2),
    new THREE.MeshBasicMaterial({map:tex,transparent:true})
  );

  mesh.position.set(0,y,0.1);
  interactables.push({mesh,url});
  return mesh;
}

// ===== AR MODULE =====
function arModule(){

  let group;

  function applyPose(g, d){
    g.position.set(d.position.x,d.position.y,d.position.z);
    g.quaternion.set(d.rotation.x,d.rotation.y,d.rotation.z,d.rotation.w);
    g.scale.setScalar(d.scale);
  }

  function handleClick(x,y){
    const rect = renderCanvas.getBoundingClientRect();
    const nx = (x/rect.width)*2-1;
    const ny = -(y/rect.height)*2+1;

    raycaster.setFromCamera({x:nx,y:ny}, camera);
    const hits = raycaster.intersectObjects(interactables.map(i=>i.mesh));

    if(hits.length){
      const obj = interactables.find(i=>i.mesh===hits[0].object);
      if(obj) window.open(obj.url);
    }
  }

  window.addEventListener('click',e=>handleClick(e.clientX,e.clientY));

  return {
    name:'main',

    onStart(){
      const xr = XR8.Threejs.xrScene();
      scene = xr.scene;
      camera = xr.camera;

      scene.add(new THREE.AmbientLight(0xffffff,1));

      group = new THREE.Group();
      group.visible=false;
      scene.add(group);

      // ===== MODEL =====
      new THREE.GLTFLoader().load(CONFIG.model, gltf=>{
        const m = gltf.scene;
        m.scale.set(0.1,0.1,0.1);
        m.position.set(-0.3,0,0);
        group.add(m);

        mixer = new THREE.AnimationMixer(m);
        gltf.animations.forEach(a=>mixer.clipAction(a).play());
      });

      // ===== BUTTONS =====
      group.add(makeButton("Website","https://isaoinvest.com",0));
      group.add(makeButton("Email","mailto:test@test.com",-0.25));

      // ===== VIDEO =====
      videoEl = document.createElement('video');
      videoEl.src = CONFIG.video;
      videoEl.loop = true;
      videoEl.muted = true;
      videoEl.playsInline = true;

      videoTex = new THREE.VideoTexture(videoEl);

      videoMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(1.5,0.9),
        new THREE.MeshBasicMaterial({map:videoTex})
      );

      videoMesh.position.set(0,0.5,0);
      group.add(videoMesh);
    },

    onUpdate(){
      if(mixer) mixer.update(0.016);
    },

    listeners:[
      {
        event:'reality.imagefound',
        process:({detail})=>{
          group.visible=true;
          applyPose(group,detail);
          videoEl.play();
        }
      },
      {
        event:'reality.imageupdated',
        process:({detail})=>{
          applyPose(group,detail);
        }
      },
      {
        event:'reality.imagelost',
        process:()=>{
          group.visible=false;
          videoEl.pause();
        }
      }
    ]
  }
}

// ===== START =====
async function start(){

  XR8.XrController.configure({
    imageTargetData: CONFIG.targets,
    disableWorldTracking:true
  });

  XR8.addCameraPipelineModules([
    XR8.GlTextureRenderer.pipelineModule(),
    XR8.Threejs.pipelineModule(),
    XR8.XrController.pipelineModule(),
    arModule()
  ]);

  XR8.run({
    canvas: document.getElementById('renderCanvas')
  });

}

start();

</script>

</body>
</html>
